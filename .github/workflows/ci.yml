name: CI

"on":
  push:
  pull_request:
    branches:
      - main
      - CClean-fixes
      - v0.4-refactor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest tests/ -q

      # Deferred to v0.5:
      # - name: mypy (full strict audit pending step 17)
      #   run: mypy pyRVtest
      # - name: doctest (pending step 21)
      #   run: python -m pytest --doctest-modules pyRVtest
