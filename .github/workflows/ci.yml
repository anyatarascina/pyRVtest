name: CI

"on":
  push:
  pull_request:
    branches:
      - main
      - CClean-fixes
      - v0.4-refactor

jobs:
  test:
    # v0.4.0rc1 follow-up: two-version matrix so LAPACK-build-dependent
    # numerical differences between numpy 1.x and numpy 2.x surface in CI.
    # numpy1: the legacy-pinned environment matching what coauthors run
    # on older numpy 1.26 / pyblp 1.1.x.
    # numpy2: the modern environment (numpy 2.0+ / pyblp 1.2+). The
    # `analytical_scale` snapshot xfails under numpy 2 by design; see
    # tests/test_snapshots.py for the full diagnostic.
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: numpy1
            python-version: "3.11"
            numpy-pin: "numpy<2"
            pyblp-pin: "pyblp<1.2"
          - label: numpy2
            python-version: "3.11"
            numpy-pin: "numpy>=2,<3"
            pyblp-pin: "pyblp>=1.2"

    runs-on: ubuntu-latest
    name: test (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.label }}-${{ hashFiles('requirements*.txt', 'setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.label }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Pin numpy and pyblp to the matrix variant first so pyRVtest's
          # pip install does not bump them.
          pip install "${{ matrix.numpy-pin }}" "${{ matrix.pyblp-pin }}"
          pip install -e . --upgrade-strategy only-if-needed
          pip install -r requirements-dev.txt --upgrade-strategy only-if-needed

      - name: Report resolved versions
        run: |
          python -c "import numpy, scipy, pyblp, pandas; print(f'numpy {numpy.__version__}  scipy {scipy.__version__}  pyblp {pyblp.__version__}  pandas {pandas.__version__}')"

      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: |
          python -m pytest tests/ --tb=short -q 2>&1 | tee /tmp/pytest.log
          exit ${PIPESTATUS[0]}

      - name: Emit failure summary as annotation
        if: always()
        # Surfaces a pytest summary into the GitHub annotations stream so
        # the unauthenticated ``check-runs/annotations`` API can read it
        # (the raw log download requires auth). Truncates to the
        # annotation length limit. Remove once the matrix is stable.
        run: |
          if [ ! -f /tmp/pytest.log ]; then
            echo "::error::pytest.log not found"
            exit 0
          fi
          echo "--- last 80 lines of pytest output ---"
          tail -80 /tmp/pytest.log
          SUM=$(grep -E "^=+ .*(failed|passed|error).* =+$" /tmp/pytest.log | tail -1 || true)
          FAILS=$(grep -E "^(FAILED|ERROR) " /tmp/pytest.log | head -20 || true)
          {
            echo "summary: ${SUM}"
            echo
            echo "failed tests (first 20):"
            echo "${FAILS}"
            echo
            echo "last 40 output lines:"
            tail -40 /tmp/pytest.log
          } > /tmp/annotation.txt
          # Trim to ~3500 chars (GitHub annotation limit ~4096)
          MSG=$(head -c 3500 /tmp/annotation.txt)
          # Encode newlines/CRs/% for the workflow command
          ENC=$(printf '%s' "$MSG" | sed 's/%/%25/g; s/\r/%0D/g' | python3 -c 'import sys; print(sys.stdin.read().replace(chr(10), "%0A"), end="")')
          echo "::error title=pytest-failure-summary::${ENC}"

      - name: Fail job if pytest failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1

      - name: Run doctest (v0.4 step 21)
        run: python -m pytest --doctest-modules pyRVtest -q

      # Deferred to v0.5:
      # - name: mypy (full strict audit pending step 17)
      #   run: mypy pyRVtest
