; mypy configuration for pyRVtest.
;
; v0.4 step 2: first use of mypy in this project. Default strictness is
; lax — most of the existing pyRVtest code predates typing and will
; fail strict checks. Each new or moved module gets its own
; [mypy-pyRVtest.<module>] section with strict = True as the migration
; progresses (per the incremental mypy rule in
; .claude/plans/v0.4-refactor.md §5 cross-cutting rules).
;
; Step 17 audits the whole package with strict; by then most modules
; should already pass.
;
; PyBLP does not ship mypy stubs. When a pyRVtest file imports from
; pyblp.utilities.basics / pyblp.configurations.formulation and mypy
; complains, add a narrow # type: ignore[...] comment naming the gap.
; Do not set ignore_missing_imports = True globally — that would
; silence real type errors elsewhere.

[mypy]
python_version = 3.9
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
show_error_codes = True

; PyBLP lacks stubs — we import it in the pyRVtest.products module.
[mypy-pyblp.*]
ignore_missing_imports = True

; pandas and scipy lack inlined stubs in the runtime environment. The
; pyRVtest.results.results module (step 9) uses pandas for DataFrame
; exports and scipy.stats.norm for the RV critical value; strict-mypy
; clients should add ``pandas-stubs`` / ``scipy-stubs`` to dev-deps if
; they want tight type checks on those boundary calls.
[mypy-pandas.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

; Incrementally-strict modules. Append a new section below each time
; a migration step produces a new clean module.

[mypy-pyRVtest.products]
strict = True

[mypy-pyRVtest.backends.base]
strict = True

[mypy-pyRVtest.backends]
strict = True

; PyBLPBackend intentionally accesses PyBLP private attributes
; (`_sigma`, `_pi`, `_beta`, `_rho`, `_delta`). Not strict-mypy-clean
; because pyblp.ProblemResults is typed as `Any` (no stubs), so the
; attribute lookups inside the class are all `Any`. Revisit at step 17.
[mypy-pyRVtest.backends.pyblp]
; PyBLPBackend intentionally accesses PyBLP private attributes
; (`_sigma`, `_pi`, `_beta`, `_rho`, `_delta`). Not strict-mypy-clean
; because pyblp.ProblemResults is typed as `Any` (no stubs), so the
; attribute lookups inside the class are all `Any`. Revisit at step 17.
strict = False
disallow_untyped_defs = True
disable_error_code = no-any-return

[mypy-pyRVtest.backends.logit]
; Module-level functions were moved verbatim from demand_jacobian.py
; which predates typing. The pyblp `Array` alias is `Any`, which makes
; tightening hard. LogitBackend wrapper has explicit type annotations.
; Revisit at step 17.
strict = False
disable_error_code = type-arg, no-untyped-call

[mypy-pyRVtest.backends.nested_logit]
; NestedLogitBackend wraps the nested-logit module functions from logit.py.
; Same `Array = Any` caveat as logit.py. Revisit at step 17.
strict = False
disable_error_code = type-arg, no-untyped-call

[mypy-pyRVtest.backends.user]
; UserSuppliedBackend is designed to accept arbitrary user-supplied
; Jacobians/Hessians, so the payload types are wider than strict mypy
; would prefer. Class-level annotations are explicit; pyblp Array alias
; is Any so some returns decay. Revisit at step 17.
strict = False
disallow_untyped_defs = True

; --- v0.4 step 17: additional strict-clean modules ---

[mypy-pyRVtest.output]
strict = True

[mypy-pyRVtest.data]
strict = True

[mypy-pyRVtest.formulation]
strict = True

[mypy-pyRVtest.models._adapter]
strict = True

[mypy-pyRVtest.models.standard]
strict = True

[mypy-pyRVtest.results]
strict = True

[mypy-pyRVtest.results.results]
strict = True

[mypy-pyRVtest.results.panel]
strict = True

[mypy-pyRVtest.solve.demand_adjustment]
strict = True

[mypy-pyRVtest.solve.passthrough]
strict = True

; --- v0.4 step 17: legacy modules that remain lax ---
;
; The two legacy modules below (pre-v0.4) mix typed and untyped code
; and store several fields as ``Optional[...]`` that are narrowed
; dynamically (assigned in __init__ before use) in ways strict mypy
; cannot follow without an intrusive refactor. Step 17 left these
; non-strict to avoid changing runtime behavior. Tightening them is
; tracked as future work and would be picked up by a dedicated step.

[mypy-pyRVtest.problem]
; Large central module (>1500 lines, 14 methods on Problem). Many
; ``Optional[Any]`` class-attribute declarations are narrowed in
; __init__ but strict mypy cannot infer the narrowing. Separately,
; multiple ``List[str]`` locals are populated with arrays of mixed
; dtype via dynamic column assembly — idiomatic for the pre-v0.4
; code. A step 18 refactor would split Problem into the helpers in
; solve/ and move these annotations to the narrower primitives.
strict = False
disable_error_code = type-arg, union-attr, no-any-return, arg-type, no-untyped-def, no-untyped-call, call-overload, operator, index, misc, assignment, import-untyped, attr-defined

[mypy-pyRVtest.markups]
; Legacy markup-computation module. ``Models`` is a PyBLP-backed
; record array (``Any`` to mypy) that we index by string keys at
; runtime; mypy refuses to infer the runtime contract. Numpy masked
; arrays and ``None`` fallbacks for Optional ownership inputs make
; several ``operator`` / ``index`` errors structurally unavoidable
; without reshaping the public signature. Revisit when splitting
; ``_compute_markups`` into typed primitives.
strict = False
disable_error_code = type-arg, union-attr, no-any-return, arg-type, no-untyped-def, no-untyped-call, call-overload, operator, index, misc, assignment, import-untyped, no-redef, return-value, attr-defined

; The instruments submodules (step 13) use the pyblp ``Array`` alias
; (= ``Any``) for input/output parametrization. Internally the logic
; is straight numpy; strict mypy complains about ``ndarray`` without
; explicit generic parameters. Lax overrides matching the precedent
; set for backends.logit / backends.nested_logit. Tightening requires
; replacing ``Array`` with ``NDArray[np.float64]`` at every public
; boundary in the instruments package; tracked as future work.

[mypy-pyRVtest.instruments.product]
strict = False
disable_error_code = type-arg, no-any-return

[mypy-pyRVtest.instruments.labor]
strict = False
disable_error_code = type-arg, no-any-return
