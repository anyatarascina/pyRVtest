; mypy configuration for pyRVtest.
;
; v0.4 step 2: first use of mypy in this project. Default strictness is
; lax — most of the existing pyRVtest code predates typing and will
; fail strict checks. Each new or moved module gets its own
; [mypy-pyRVtest.<module>] section with strict = True as the migration
; progresses (per the incremental mypy rule in
; .claude/plans/v0.4-refactor.md §5 cross-cutting rules).
;
; Step 17 audits the whole package with strict; by then most modules
; should already pass.
;
; PyBLP does not ship mypy stubs. When a pyRVtest file imports from
; pyblp.utilities.basics / pyblp.configurations.formulation and mypy
; complains, add a narrow # type: ignore[...] comment naming the gap.
; Do not set ignore_missing_imports = True globally — that would
; silence real type errors elsewhere.

[mypy]
python_version = 3.9
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
show_error_codes = True

; PyBLP lacks stubs — we import it in the pyRVtest.products module.
[mypy-pyblp.*]
ignore_missing_imports = True

; Incrementally-strict modules. Append a new section below each time
; a migration step produces a new clean module.

[mypy-pyRVtest.products]
strict = True
